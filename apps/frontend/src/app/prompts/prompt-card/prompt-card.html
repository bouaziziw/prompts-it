<p-card class="mb-3" se>
  <div class="flex justify-content-between align-items-center mb-2">
    <div>
      <h3 class="mb-0">{{ prompt().title }}</h3>
      <span class="text-sm text-color-secondary">@{{ prompt().author.username }}</span>
    </div>
    <div class="flex gap-2">
      @if(canEdit()) {
        <p-button
        icon="pi pi-pencil"
        size="small"
        [text]="true"
        [routerLink]="['/prompts', prompt().id, 'edit']"
      />
      }
      <p-button icon="pi pi-copy" size="small" [text]="true" (click)="copyToClipboard()" />
    </div>
  </div>
  <textarea pTextarea readonly class="w-full mb-2" rows="8">{{ prompt().content }}</textarea>
  <div class="flex justify-content-between">
    <p-tag [value]="prompt().category.name" />
    <div class="flex gap-2 align-items-center">
      <p-button icon="pi pi-thumbs-up" severity="secondary" size="small" />
      <span>{{ prompt().score }}</span>
      <p-button icon="pi pi-thumbs-down" severity="secondary" size="small" />
    </div>
  </div>
</p-card>
